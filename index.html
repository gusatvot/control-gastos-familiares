                    showToast(`${type === 'expense' ? 'Gasto' : 'Ingreso'} eliminado exitosamente!`, 'success');
                    onClose();
                    refreshData();

                } catch (error) {
                    console.error('Error deleting transaction:', error);
                    showToast('Error: ' + error.message, 'error');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <Modal title="Confirmar Eliminación" onClose={onClose}>
                    <div className="space-y-4">
                        <p className="text-gray-300">
                            ¿Estás seguro de que quieres eliminar este {type === 'expense' ? 'gasto' : 'ingreso'}? 
                            Esta acción no se puede deshacer.
                        </p>
                        
                        <div className="flex space-x-3 pt-4">
                            <button
                                onClick={onClose}
                                className="flex-1 bg-gray-600 hover:bg-gray-500 text-white font-semibold py-3 px-4 rounded-lg transition-colors"
                            >
                                Cancelar
                            </button>
                            <button
                                onClick={handleDelete}
                                disabled={loading}
                                className="flex-1 bg-red-600 hover:bg-red-700 disabled:bg-red-800 text-white font-semibold py-3 px-4 rounded-lg transition-colors flex items-center justify-center"
                            >
                                {loading ? (
                                    <>
                                        <div className="loading-spinner mr-2"></div>
                                        Eliminando...
                                    </>
                                ) : (
                                    'Eliminar'
                                )}
                            </button>
                        </div>
                    </div>
                </Modal>
            );
        }

        function CategoriesModal({ onClose, refreshData, expenseCategories, incomeCategories }) {
            const [newCategoryName, setNewCategoryName] = React.useState('');
            const [categoryType, setCategoryType] = React.useState('expense');
            const [loading, setLoading] = React.useState(false);

            const handleAddCategory = async (e) => {
                e.preventDefault();
                
                if (!newCategoryName.trim()) {
                    alert('Por favor ingresa un nombre para la categoría');
                    return;
                }

                setLoading(true);

                try {
                    const { data: { user } } = await supabase.auth.getUser();
                    if (!user) throw new Error('No hay usuario autenticado');

                    const { data: profile } = await supabase
                        .from('profiles')
                        .select('family_code')
                        .eq('id', user.id)
                        .single();

                    if (!profile) throw new Error('No se pudo obtener el perfil del usuario');

                    const table = categoryType === 'expense' ? 'expense_categories' : 'income_categories';
                    
                    const { error } = await supabase
                        .from(table)
                        .insert([
                            {
                                name: newCategoryName.trim(),
                                family_code: profile.family_code,
                            },
                        ]);

                    if (error) throw error;

                    showToast('Categoría agregada exitosamente!', 'success');
                    setNewCategoryName('');
                    refreshData();

                } catch (error) {
                    console.error('Error adding category:', error);
                    showToast('Error: ' + error.message, 'error');
                } finally {
                    setLoading(false);
                }
            };

            const handleDeleteCategory = async (categoryId, categoryName, type) => {
                if (!confirm(`¿Estás seguro de que quieres eliminar la categoría "${categoryName}"?`)) {
                    return;
                }

                try {
                    const table = type === 'expense' ? 'expense_categories' : 'income_categories';
                    const { error } = await supabase
                        .from(table)
                        .delete()
                        .eq('id', categoryId);

                    if (error) throw error;

                    showToast('Categoría eliminada exitosamente!', 'success');
                    refreshData();

                } catch (error) {
                    console.error('Error deleting category:', error);
                    showToast('Error: ' + error.message, 'error');
                }
            };

            return (
                <Modal title="Gestión de Categorías" onClose={onClose}>
                    <div className="space-y-6">
                        {/* Formulario para agregar categoría */}
                        <div>
                            <h3 className="text-lg font-semibold mb-3">Agregar Nueva Categoría</h3>
                            <form onSubmit={handleAddCategory} className="space-y-3">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-300 mb-1">
                                            Tipo de Categoría
                                        </label>
                                        <select
                                            value={categoryType}
                                            onChange={(e) => setCategoryType(e.target.value)}
                                            className="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:border-blue-500 focus:outline-none"
                                        >
                                            <option value="expense">Gasto</option>
                                            <option value="income">Ingreso</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-300 mb-1">
                                            Nombre de la Categoría
                                        </label>
                                        <input
                                            type="text"
                                            value={newCategoryName}
                                            onChange={(e) => setNewCategoryName(e.target.value)}
                                            className="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:border-blue-500 focus:outline-none"
                                            placeholder="Nombre de la categoría"
                                            required
                                        />
                                    </div>
                                </div>
                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-800 text-white font-semibold py-2 px-4 rounded-lg transition-colors flex items-center justify-center"
                                >
                                    {loading ? (
                                        <>
                                            <div className="loading-spinner mr-2"></div>
                                            Agregando...
                                        </>
                                    ) : (
                                        'Agregar Categoría'
                                    )}
                                </button>
                            </form>
                        </div>

                        {/* Lista de categorías existentes */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {/* Categorías de Gastos */}
                            <div>
                                <h4 className="font-semibold mb-3 text-red-400">Categorías de Gastos</h4>
                                <div className="space-y-2">
                                    {expenseCategories.map((category) => (
                                        <div key={category.id} className="flex items-center justify-between p-2 bg-gray-700 rounded">
                                            <span>{category.name}</span>
                                            <button
                                                onClick={() => handleDeleteCategory(category.id, category.name, 'expense')}
                                                className="text-red-400 hover:text-red-300 transition-colors"
                                                title="Eliminar categoría"
                                            >
                                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Categorías de Ingresos */}
                            <div>
                                <h4 className="font-semibold mb-3 text-green-400">Categorías de Ingresos</h4>
                                <div className="space-y-2">
                                    {incomeCategories.map((category) => (
                                        <div key={category.id} className="flex items-center justify-between p-2 bg-gray-700 rounded">
                                            <span>{category.name}</span>
                                            <button
                                                onClick={() => handleDeleteCategory(category.id, category.name, 'income')}
                                                className="text-red-400 hover:text-red-300 transition-colors"
                                                title="Eliminar categoría"
                                            >
                                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </Modal>
            );
        }

        function BudgetsModal({ onClose, refreshData, budgets, expenseCategories }) {
            const [selectedCategory, setSelectedCategory] = React.useState('');
            const [amount, setAmount] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                
                if (!selectedCategory || !amount) {
                    alert('Por favor completa todos los campos');
                    return;
                }

                setLoading(true);

                try {
                    const { data: { user } } = await supabase.auth.getUser();
                    if (!user) throw new Error('No hay usuario autenticado');

                    const { data: profile } = await supabase
                        .from('profiles')
                        .select('family_code')
                        .eq('id', user.id)
                        .single();

                    if (!profile) throw new Error('No se pudo obtener el perfil del usuario');

                    // Verificar si ya existe un presupuesto para esta categoría
                    const existingBudget = budgets.find(b => b.category === selectedCategory);

                    if (existingBudget) {
                        // Actualizar presupuesto existente
                        const { error } = await supabase
                            .from('budgets')
                            .update({
                                amount: parseFloat(amount),
                                updated_at: new Date().toISOString()
                            })
                            .eq('id', existingBudget.id);

                        if (error) throw error;
                        alert('Presupuesto actualizado exitosamente!');
                    } else {
                        // Crear nuevo presupuesto
                        const { error } = await supabase
                            .from('budgets')
                            .insert([
                                {
                                    category: selectedCategory,
                                    amount: parseFloat(amount),
                                    family_code: profile.family_code,
                                    created_by: user.id,
                                },
                            ]);

                        if (error) throw error;
                        alert('Presupuesto creado exitosamente!');
                    }

                    setSelectedCategory('');
                    setAmount('');
                    refreshData();

                } catch (error) {
                    console.error('Error saving budget:', error);
                    showToast('Error: ' + error.message, 'error');
                } finally {
                    setLoading(false);
                }
            };

            const handleDeleteBudget = async (budgetId, categoryName) => {
                if (!confirm(`¿Estás seguro de que quieres eliminar el presupuesto para "${categoryName}"?`)) {
                    return;
                }

                try {
                    const { error } = await supabase
                        .from('budgets')
                        .delete()
                        .eq('id', budgetId);

                    if (error) throw error;

                    alert('Presupuesto eliminado exitosamente!');
                    refreshData();

                } catch (error) {
                    console.error('Error deleting budget:', error);
                    showToast('Error: ' + error.message, 'error');
                }
            };

            return (
                <Modal title="Gestión de Presupuestos" onClose={onClose}>
                    <div className="space-y-6">
                        {/* Formulario para agregar/editar presupuesto */}
                        <div>
                            <h3 className="text-lg font-semibold mb-3">
                                {budgets.find(b => b.category === selectedCategory) ? 'Editar Presupuesto' : 'Crear Presupuesto'}
                            </h3>
                            <form onSubmit={handleSubmit} className="space-y-3">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-300 mb-1">
                                            Categoría
                                        </label>
                                        <select
                                            value={selectedCategory}
                                            onChange={(e) => {
                                                setSelectedCategory(e.target.value);
                                                const budget = budgets.find(b => b.category === e.target.value);
                                                setAmount(budget ? budget.amount.toString() : '');
                                            }}
                                            className="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:border-blue-500 focus:outline-none"
                                            required
                                        >
                                            <option value="">Seleccionar categoría</option>
                                            {expenseCategories.map((cat) => (
                                                <option key={cat.id} value={cat.name}>{cat.name}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-300 mb-1">
                                            Monto del Presupuesto
                                        </label>
                                        <input
                                            type="number"
                                            step="0.01"
                                            value={amount}
                                            onChange={(e) => setAmount(e.target.value)}
                                            className="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:border-blue-500 focus:outline-none"
                                            placeholder="0.00"
                                            required
                                        />
                                    </div>
                                </div>
                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="w-full bg-purple-600 hover:bg-purple-700 disabled:bg-purple-800 text-white font-semibold py-2 px-4 rounded-lg transition-colors flex items-center justify-center"
                                >
                                    {loading ? (
                                        <>
                                            <div className="loading-spinner mr-2"></div>
                                            Guardando...
                                        </>
                                    ) : (
                                        budgets.find(b => b.category === selectedCategory) ? 'Actualizar Presupuesto' : 'Crear Presupuesto'
                                    )}
                                </button>
                            </form>
                        </div>

                        {/* Lista de presupuestos existentes */}
                        <div>
                            <h4 className="font-semibold mb-3">Presupuestos Existentes</h4>
                            <div className="space-y-2">
                                {budgets.map((budget) => (
                                    <div key={budget.id} className="flex items-center justify-between p-3 bg-gray-700 rounded">
                                        <div>
                                            <span className="font-medium">{budget.category}</span>
                                            <p className="text-sm text-gray-400">${parseFloat(budget.amount).toLocaleString()}</p>
                                        </div>
                                        <div className="flex space-x-2">
                                            <button
                                                onClick={() => {
                                                    setSelectedCategory(budget.category);
                                                    setAmount(budget.amount.toString());
                                                }}
                                                className="text-blue-400 hover:text-blue-300 transition-colors"
                                                title="Editar presupuesto"
                                            >
                                                <i data-lucide="edit-2" className="w-4 h-4"></i>
                                            </button>
                                            <button
                                                onClick={() => handleDeleteBudget(budget.id, budget.category)}
                                                className="text-red-400 hover:text-red-300 transition-colors"
                                                title="Eliminar presupuesto"
                                            >
                                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                                {budgets.length === 0 && (
                                    <p className="text-gray-400 text-center py-4">No hay presupuestos configurados</p>
                                )}
                            </div>
                        </div>
                    </div>
                </Modal>
            );
        }

        function ReportsModal({ onClose, expenses, incomes, expenseCategories }) {
            const [reportType, setReportType] = React.useState('general');
            const [dateRange, setDateRange] = React.useState('month');
            const [chartInstance, setChartInstance] = React.useState(null);

            const chartRef = React.useRef(null);

            // Función para generar datos del reporte
            const generateReportData = () => {
                const now = new Date();
                let startDate, endDate;

                switch (dateRange) {
                    case 'week':
                        startDate = new Date(now.setDate(now.getDate() - 7));
                        endDate = new Date();
                        break;
                    case 'month':
                        startDate = new Date(now.getFullYear(), now.getMonth(), 1);
                        endDate = new Date(now.getFullYear(), now.getMonth() + 1, 0);
                        break;
                    case 'year':
                        startDate = new Date(now.getFullYear(), 0, 1);
                        endDate = new Date(now.getFullYear(), 11, 31);
                        break;
                    default:
                        startDate = new Date(0);
                        endDate = new Date();
                }

                const filteredExpenses = expenses.filter(expense => 
                    new Date(expense.date) >= startDate && new Date(expense.date) <= endDate
                );
                const filteredIncomes = incomes.filter(income => 
                    new Date(income.date) >= startDate && new Date(income.date) <= endDate
                );

                return { filteredExpenses, filteredIncomes, startDate, endDate };
            };

            // Función para exportar a Excel
            const exportToExcel = () => {
                const { filteredExpenses, filteredIncomes } = generateReportData();
                
                const expenseData = filteredExpenses.map(expense => ({
                    'Tipo': 'Gasto',
                    'Descripción': expense.description,
                    'Categoría': expense.category,
                    'Monto': parseFloat(expense.amount),
                    'Fecha': expense.date
                }));

                const incomeData = filteredIncomes.map(income => ({
                    'Tipo': 'Ingreso',
                    'Descripción': income.description,
                    'Categoría': income.category,
                    'Monto': parseFloat(income.amount),
                    'Fecha': income.date
                }));

                const allData = [...expenseData, ...incomeData];
                
                const ws = XLSX.utils.json_to_sheet(allData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Reporte');
                XLSX.writeFile(wb, `reporte-gastos-${new Date().toISOString().split('T')[0]}.xlsx`);
            };

            // Función para exportar a PDF
            const exportToPDF = () => {
                const { filteredExpenses, filteredIncomes, startDate, endDate } = generateReportData();
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                doc.setFontSize(16);
                doc.text('Reporte de Gastos Familiares', 20, 20);
                doc.setFontSize(12);
                doc.text(`Período: ${startDate.toLocaleDateString()} - ${endDate.toLocaleDateString()}`, 20, 30);

                let yPosition = 50;

                // Resumen
                doc.setFontSize(14);
                doc.text('Resumen', 20, yPosition);
                yPosition += 10;

                const totalExpenses = filteredExpenses.reduce((sum, expense) => sum + parseFloat(expense.amount), 0);
                const totalIncomes = filteredIncomes.reduce((sum, income) => sum + parseFloat(income.amount), 0);
                const balance = totalIncomes - totalExpenses;

                doc.text(`Total Ingresos: $${totalIncomes.toLocaleString()}`, 20, yPosition);
                yPosition += 10;
                doc.text(`Total Gastos: $${totalExpenses.toLocaleString()}`, 20, yPosition);
                yPosition += 10;
                doc.text(`Balance: $${balance.toLocaleString()}`, 20, yPosition);
                yPosition += 20;

                // Gastos por categoría
                if (filteredExpenses.length > 0) {
                    doc.setFontSize(14);
                    doc.text('Gastos por Categoría', 20, yPosition);
                    yPosition += 10;

                    const categories = {};
                    filteredExpenses.forEach(expense => {
                        categories[expense.category] = (categories[expense.category] || 0) + parseFloat(expense.amount);
                    });

                    Object.entries(categories).forEach(([category, amount]) => {
                        if (yPosition > 270) {
                            doc.addPage();
                            yPosition = 20;
                        }
                        doc.text(`${category}: $${amount.toLocaleString()}`, 30, yPosition);
                        yPosition += 10;
                    });
                }

                doc.save(`reporte-gastos-${new Date().toISOString().split('T')[0]}.pdf`);
            };

            // Renderizar gráfico
            React.useEffect(() => {
                if (chartRef.current && reportType === 'general') {
                    if (chartInstance) {
                        chartInstance.destroy();
                    }

                    const { filteredExpenses } = generateReportData();
                    
                    const categories = {};
                    filteredExpenses.forEach(expense => {
                        categories[expense.category] = (categories[expense.category] || 0) + parseFloat(expense.amount);
                    });

                    const ctx = chartRef.current.getContext('2d');
                    const newChartInstance = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: Object.keys(categories),
                            datasets: [{
                                data: Object.values(categories),
                                backgroundColor: [
                                    '#ef4444', '#f97316', '#f59e0b', '#eab308',
                                    '#84cc16', '#22c55e', '#14b8a6', '#06b6d4',
                                    '#3b82f6', '#6366f1', '#8b5cf6', '#a855f7'
                                ],
                                borderWidth: 2,
                                borderColor: '#1f2937'
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    position: 'bottom',
                                    labels: {
                                        color: '#d1d5db',
                                        font: {
                                            size: 12
                                        }
                                    }
                                },
                                title: {
                                    display: true,
                                    text: 'Distribución de Gastos por Categoría',
                                    color: '#d1d5db',
                                    font: {
                                        size: 16
                                    }
                                }
                            }
                        }
                    });

                    setChartInstance(newChartInstance);
                }

                return () => {
                    if (chartInstance) {
                        chartInstance.destroy();
                    }
                };
            }, [reportType, dateRange, expenses]);

            const { filteredExpenses, filteredIncomes, startDate, endDate } = generateReportData();
            const totalExpenses = filteredExpenses.reduce((sum, expense) => sum + parseFloat(expense.amount), 0);
            const totalIncomes = filteredIncomes.reduce((sum, income) => sum + parseFloat(income.amount), 0);
            const balance = totalIncomes - totalExpenses;

            return (
                <Modal title="Reportes y Análisis" onClose={onClose} wide={true}>
                    <div className="space-y-6">
                        {/* Controles del reporte */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-300 mb-1">
                                    Tipo de Reporte
                                </label>
                                <select
                                    value={reportType}
                                    onChange={(e) => setReportType(e.target.value)}
                                    className="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:border-blue-500 focus:outline-none"
                                >
                                    <option value="general">Reporte General</option>
                                    <option value="expenses">Solo Gastos</option>
                                    <option value="incomes">Solo Ingresos</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-300 mb-1">
                                    Período
                                </label>
                                <select
                                    value={dateRange}
                                    onChange={(e) => setDateRange(e.target.value)}
                                    className="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:border-blue-500 focus:outline-none"
                                >
                                    <option value="week">Última Semana</option>
                                    <option value="month">Este Mes</option>
                                    <option value="year">Este Año</option>
                                    <option value="all">Todo el Período</option>
                                </select>
                            </div>
                            <div className="flex space-x-2 items-end">
                                <button
                                    onClick={exportToExcel}
                                    className="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors"
                                >
                                    Exportar Excel
                                </button>
                                <button
                                    onClick={exportToPDF}
                                    className="flex-1 bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors"
                                >
                                    Exportar PDF
                                </button>
                            </div>
                        </div>

                        {/* Resumen */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div className="bg-gray-800 rounded-lg p-4 text-center">
                                <p className="text-gray-400 text-sm">Total Ingresos</p>
                                <p className="text-2xl font-semibold text-green-400">
                                    ${totalIncomes.toLocaleString()}
                                </p>
                            </div>
                            <div className="bg-gray-800 rounded-lg p-4 text-center">
                                <p className="text-gray-400 text-sm">Total Gastos</p>
                                <p className="text-2xl font-semibold text-red-400">
                                    ${totalExpenses.toLocaleString()}
                                </p>
                            </div>
                            <div className="bg-gray-800 rounded-lg p-4 text-center">
                                <p className="text-gray-400 text-sm">Balance</p>
                                <p className={`text-2xl font-semibold ${balance >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                    ${balance.toLocaleString()}
                                </p>
                            </div>
                        </div>

                        {/* Gráfico */}
                        {reportType === 'general' && (
                            <div className="bg-gray-800 rounded-lg p-4">
                                <div className="h-80">
                                    <canvas ref={chartRef}></canvas>
                                </div>
                            </div>
                        )}

                        {/* Estadísticas detalladas */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {/* Gastos por categoría */}
                            <div className="bg-gray-800 rounded-lg p-4">
                                <h4 className="font-semibold mb-3">Gastos por Categoría</h4>
                                <div className="space-y-2">
                                    {Object.entries(
                                        filteredExpenses.reduce((acc, expense) => {
                                            acc[expense.category] = (acc[expense.category] || 0) + parseFloat(expense.amount);
                                            return acc;
                                        }, {})
                                    )
                                    .sort(([,a], [,b]) => b - a)
                                    .map(([category, amount]) => (
                                        <div key={category} className="flex justify-between items-center">
                                            <span>{category}</span>
                                            <span className="text-red-400 font-semibold">
                                                ${amount.toLocaleString()}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Ingresos por categoría */}
                            <div className="bg-gray-800 rounded-lg p-4">
                                <h4 className="font-semibold mb-3">Ingresos por Categoría</h4>
                                <div className="space-y-2">
                                    {Object.entries(
                                        filteredIncomes.reduce((acc, income) => {
                                            acc[income.category] = (acc[income.category] || 0) + parseFloat(income.amount);
                                            return acc;
                                        }, {})
                                    )
                                    .sort(([,a], [,b]) => b - a)
                                    .map(([category, amount]) => (
                                        <div key={category} className="flex justify-between items-center">
                                            <span>{category}</span>
                                            <span className="text-green-400 font-semibold">
                                                ${amount.toLocaleString()}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Información del período */}
                        <div className="text-center text-gray-400 text-sm">
                            Reporte generado para el período: {startDate.toLocaleDateString()} - {endDate.toLocaleDateString()}
                        </div>
                    </div>
                </Modal>
            );
        }

        // =============================================
        // INICIALIZACIÓN DE LA APLICACIÓN
        // =============================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Inicializar Lucide Icons después de renderizar
        setTimeout(() => {
            if (window.lucide && window.lucide.createIcons) {
                window.lucide.createIcons();
            }
        }, 100);
    </script>
</body>

</html>
