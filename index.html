    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->

    <!-- SheetJS para exportar Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <!-- jsPDF para exportar PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        .toast {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 12px 20px;
    border-radius: 8px;
    color: white;
    font-weight: 500;
    z-index: 1000;
    transform: translateX(400px);
    transition: transform 0.3s ease;
    max-width: 300px;
}

.toast.show {
    transform: translateX(0);
}

.toast.success {
    background: #10b981;
    border-left: 4px solid #059669;
}

.toast.error {
    background: #ef4444;
    border-left: 4px solid #dc2626;
}

.toast.warning {
    background: #f59e0b;
    border-left: 4px solid #d97706;
}

.toast.info {
    background: #3b82f6;
    border-left: 4px solid #2563eb;
}
        .loading-spinner {
            border: 2px solid #f3f4f6;
            border-left: 2px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        // =============================================
        // CONFIGURACIÓN SUPABASE - CON TUS CREDENCIALES
        // =============================================
        const SUPABASE_URL = import.meta.env.VITE_SUPABASE_URL ||'https://hzellvrwvdpesnbvyqfz.supabase.co';
        const SUPABASE_ANON_KEY = import.meta.env.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6ZWxsdnJ3dmRwZXNuYnZ5cWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTkwOTMzMzcsImV4cCI6MjA3NDY2OTMzN30.JuM-pPwVAkadDnY7NPX8J6bZqkSdWZ7-6WL1tA6-1O0';


        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // =============================================
// SISTEMA DE NOTIFICACIONES (TOAST)
// =============================================
function showToast(message, type = 'success') {
    // Crear el elemento toast
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `
        <div class="flex items-center space-x-2">
            <i data-lucide="${getToastIcon(type)}" class="w-4 h-4"></i>
            <span>${message}</span>
        </div>
    `;
    
    // Agregar al DOM
    document.body.appendChild(toast);
    
    // Mostrar con animación
    setTimeout(() => toast.classList.add('show'), 100);
    
    // Ocultar después de 3 segundos
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => {
            if (toast.parentNode) {
                toast.parentNode.removeChild(toast);
            }
        }, 300);
    }, 3000);
    
    // Inicializar iconos Lucide para el toast
    setTimeout(() => {
        if (window.lucide && window.lucide.createIcons) {
            window.lucide.createIcons();
        }
    }, 150);
}

function getToastIcon(type) {
    const icons = {
        success: 'check-circle',
        error: 'x-circle',
        warning: 'alert-triangle',
        info: 'info'
    };
    return icons[type] || 'info';
}

        // =============================================
        // COMPONENTE PRINCIPAL DE LA APLICACIÓN
        // =============================================
        function App() {
            const [user, setUser] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [activeModal, setActiveModal] = React.useState(null);
            const [expenses, setExpenses] = React.useState([]);
            const [incomes, setIncomes] = React.useState([]);
            const [expenseCategories, setExpenseCategories] = React.useState([]);
            const [incomeCategories, setIncomeCategories] = React.useState([]);
            const [budgets, setBudgets] = React.useState([]);
            const [summary, setSummary] = React.useState({
                totalIncome: 0,
                totalExpense: 0,
                balance: 0
            });
            const [filters, setFilters] = React.useState({
                startDate: '',
                endDate: '',
                category: ''
            });

            // Verificar sesión al cargar
            React.useEffect(() => {
                checkUser();
                
                const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
                    setUser(session?.user || null);
                    setLoading(false);
                });

                return () => subscription.unsubscribe();
            }, []);

            // Cargar datos cuando el usuario cambie
            React.useEffect(() => {
                if (user) {
                    loadAllData();
                }
            }, [user]);

            const checkUser = async () => {
                try {
                    const { data: { session } } = await supabase.auth.getSession();
                    setUser(session?.user || null);
                } catch (error) {
                    console.error('Error checking user:', error);
                } finally {
                    setLoading(false);
                }
            };

            const loadAllData = async () => {
                if (!user) return;
                
                try {
                    const { data: profile } = await supabase
                        .from('profiles')
                        .select('family_code')
                        .eq('id', user.id)
                        .single();

                    if (!profile) return;

                    // Cargar todos los datos en paralelo
                    const [
                        expensesResponse,
                        incomesResponse,
                        expenseCategoriesResponse,
                        incomeCategoriesResponse,
                        budgetsResponse
                    ] = await Promise.all([
                        supabase.from('expenses').select('*').eq('family_code', profile.family_code).order('date', { ascending: false }),
                        supabase.from('incomes').select('*').eq('family_code', profile.family_code).order('date', { ascending: false }),
                        supabase.from('expense_categories').select('*').eq('family_code', profile.family_code),
                        supabase.from('income_categories').select('*').eq('family_code', profile.family_code),
                        supabase.from('budgets').select('*').eq('family_code', profile.family_code)
                    ]);

                    setExpenses(expensesResponse.data || []);
                    setIncomes(incomesResponse.data || []);
                    setExpenseCategories(expenseCategoriesResponse.data || []);
                    setIncomeCategories(incomeCategoriesResponse.data || []);
                    setBudgets(budgetsResponse.data || []);
                        // DIAGNÓSTICO: Ver qué se está cargando
                    console.log('📊 DATOS CARGADOS:');
                    console.log('Expense Categories Response:', expenseCategoriesResponse);
                    console.log('Expense Categories Data:', expenseCategoriesResponse.data);
                    console.log('Expense Categories en estado:', expenseCategoriesResponse.data || []);

                    calculateSummary(expensesResponse.data || [], incomesResponse.data || []);

                } catch (error) {
                    console.error('Error loading data:', error);
                }
            };

            const calculateSummary = (expensesData, incomesData) => {
                const currentMonth = new Date().getMonth();
                const currentYear = new Date().getFullYear();

                const monthlyExpenses = expensesData.filter(expense => {
                    const expenseDate = new Date(expense.date);
                    return expenseDate.getMonth() === currentMonth && 
                           expenseDate.getFullYear() === currentYear;
                });

                const monthlyIncomes = incomesData.filter(income => {
                    const incomeDate = new Date(income.date);
                    return incomeDate.getMonth() === currentMonth && 
                           incomeDate.getFullYear() === currentYear;
                });

                const totalExpense = monthlyExpenses.reduce((sum, expense) => sum + parseFloat(expense.amount), 0);
                const totalIncome = monthlyIncomes.reduce((sum, income) => sum + parseFloat(income.amount), 0);
                const balance = totalIncome - totalExpense;

                setSummary({
                    totalIncome,
                    totalExpense,
                    balance
                });
            };

            const getExpensesByCategory = () => {
                const categories = {};
                
                expenses.forEach(expense => {
                    if (!categories[expense.category]) {
                        categories[expense.category] = 0;
                    }
                    categories[expense.category] += parseFloat(expense.amount);
                });
                
                return Object.entries(categories).map(([category, amount]) => ({
                    category,
                    amount
                })).sort((a, b) => b.amount - a.amount);
            };

            const refreshData = () => {
                loadAllData();
            };

            const handleLogout = async () => {
                try {
                    await supabase.auth.signOut();
                    setUser(null);
                } catch (error) {
                    console.error('Error logging out:', error);
                }
            };

            // Filtrar transacciones
            const filteredExpenses = expenses.filter(expense => {
                if (filters.startDate && new Date(expense.date) < new Date(filters.startDate)) return false;
                if (filters.endDate && new Date(expense.date) > new Date(filters.endDate)) return false;
                if (filters.category && expense.category !== filters.category) return false;
                return true;
            });

            const filteredIncomes = incomes.filter(income => {
                if (filters.startDate && new Date(income.date) < new Date(filters.startDate)) return false;
                if (filters.endDate && new Date(income.date) > new Date(filters.endDate)) return false;
                if (filters.category && income.category !== filters.category) return false;
                return true;
            });

            if (loading) {
                return (
                    <div className="min-h-screen bg-gray-900 flex items-center justify-center">
                        <div className="loading-spinner"></div>
                        <span className="ml-2">Cargando...</span>
                    </div>
                );
            }

            if (!user) {
                return <AuthScreen />;
            }

            return (
                <div className="min-h-screen bg-gray-900">
                    {/* Header */}
                    <header className="bg-gray-800 border-b border-gray-700 p-4">
                        <div className="container mx-auto flex justify-between items-center">
                            <div className="flex items-center space-x-3">
                                <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                                    <span className="font-bold">$</span>
                                </div>
                                <h1 className="text-xl font-semibold">Control de Gastos Familiares</h1>
                            </div>
                            <div className="flex items-center space-x-4">
                                <span className="text-gray-300">{user.email}</span>
                                <button
                                    onClick={handleLogout}
                                    className="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg flex items-center space-x-2 transition-colors"
                                >
                                    <i data-lucide="log-out" className="w-4 h-4"></i>
                                    <span>Salir</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Contenido Principal */}
                    <main className="container mx-auto p-4">
                        {/* Acciones Rápidas */}
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
                            <ActionButton 
                                icon="plus" 
                                label="Agregar Gasto" 
                                color="red"
                                onClick={() => setActiveModal('expense')}
                            />
                            <ActionButton 
                                icon="trending-up" 
                                label="Agregar Ingreso" 
                                color="green"
                                onClick={() => setActiveModal('income')}
                            />
                            <ActionButton 
                                icon="file-text" 
                                label="Ver Reportes" 
                                color="blue"
                                onClick={() => setActiveModal('reports')}
                            />
                            <ActionButton 
                                icon="tag" 
                                label="Categorías" 
                                color="orange"
                                onClick={() => setActiveModal('categories')}
                            />
                            <ActionButton 
                                icon="target" 
                                label="Presupuestos" 
                                color="purple"
                                onClick={() => setActiveModal('budgets')}
                            />
                            <ActionButton 
                                icon="settings" 
                                label="Configuración" 
                                color="gray"
                                onClick={() => setActiveModal('settings')}
                            />
                        </div>

                        {/* Filtros */}
                        <div className="bg-gray-800 rounded-lg p-4 mb-6">
                            <h3 className="text-lg font-semibold mb-3">Filtros</h3>
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-300 mb-1">Fecha Inicio</label>
                                    <input
                                        type="date"
                                        value={filters.startDate}
                                        onChange={(e) => setFilters({...filters, startDate: e.target.value})}
                                        className="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:border-blue-500 focus:outline-none"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-300 mb-1">Fecha Fin</label>
                                    <input
                                        type="date"
                                        value={filters.endDate}
                                        onChange={(e) => setFilters({...filters, endDate: e.target.value})}
                                        className="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:border-blue-500 focus:outline-none"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-300 mb-1">Categoría</label>
                                    <select
                                    value={filters.category}
                                    onChange={(e) => setFilters({...filters, category: e.target.value})}
                                    className="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:border-blue-500 focus:outline-none"
                                >
                                    <option value="">Todas las categorías</option>
                                    <option value="Alimentación">Alimentación</option>
                                    <option value="Transporte">Transporte</option>
                                    <option value="Vivienda">Vivienda</option>
                                    <option value="Entretenimiento">Entretenimiento</option>
                                    <option value="Salud">Salud</option>
                                    <option value="Educación">Educación</option>
                                    <option value="Otros">Otros</option>
                                </select>
                                </div>
                                <div className="flex items-end">
                                    <button
                                        onClick={() => setFilters({startDate: '', endDate: '', category: ''})}
                                        className="w-full bg-gray-600 hover:bg-gray-500 text-white font-semibold py-2 px-4 rounded-lg transition-colors"
                                    >
                                        Limpiar Filtros
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Tarjetas de Resumen */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <SummaryCard 
                                title="Ingresos del Mes" 
                                amount={summary.totalIncome} 
                                color="green" 
                                icon="trending-up"
                            />
                            <SummaryCard 
                                title="Gastos del Mes" 
                                amount={summary.totalExpense} 
                                color="red" 
                                icon="trending-down"
                            />
                            <SummaryCard 
                                title="Presupuesto Disponible" 
                                amount={summary.balance} 
                                color="blue" 
                                icon="dollar-sign"
                            />
                        </div>

                        {/* Contenido Principal - Grid 2 columnas */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            {/* Historial de Gastos */}
                            <div className="bg-gray-800 rounded-lg p-6">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-lg font-semibold">Historial de Gastos</h2>
                                    <span className="text-sm text-gray-400">
                                        {filteredExpenses.length} registros
                                    </span>
                                </div>
                                {filteredExpenses.length === 0 ? (
                                    <div className="text-gray-400 text-center py-8">
                                        <i data-lucide="file-text" className="w-12 h-12 mx-auto mb-2 opacity-50"></i>
                                        <p>No hay gastos registrados</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3 max-h-80 overflow-y-auto">
                                        {filteredExpenses.map((expense) => (
                                            <TransactionItem 
                                                key={expense.id}
                                                transaction={expense}
                                                type="expense"
                                                onEdit={() => setActiveModal(`edit-expense-${expense.id}`)}
                                                onDelete={() => setActiveModal(`delete-expense-${expense.id}`)}
                                                refreshData={refreshData}
                                            />
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* Gastos por Categoría */}
                            <div className="bg-gray-800 rounded-lg p-6">
                                <h2 className="text-lg font-semibold mb-4">Gastos por Categoría</h2>
                                {expenses.length === 0 ? (
                                    <div className="text-gray-400 text-center py-8">
                                        <i data-lucide="pie-chart" className="w-12 h-12 mx-auto mb-2 opacity-50"></i>
                                        <p>No hay datos para mostrar</p>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {getExpensesByCategory().map((item, index) => {
                                            const totalExpenses = expenses.reduce((sum, expense) => sum + parseFloat(expense.amount), 0);
                                            const percentage = ((item.amount / totalExpenses) * 100).toFixed(1);
                                            const budget = budgets.find(b => b.category === item.category);
                                            const budgetPercentage = budget ? ((item.amount / budget.amount) * 100).toFixed(1) : null;
                                            
                                            return (
                                                <div key={index} className="space-y-2">
                                                    <div className="flex justify-between items-center">
                                                        <span className="font-medium">{item.category}</span>
                                                        <div className="text-right">
                                                            <span className="text-red-400 font-semibold block">
                                                                ${item.amount.toLocaleString()} ({percentage}%)
                                                            </span>
                                                            {budget && (
                                                                <span className={`text-xs ${budgetPercentage > 100 ? 'text-red-500' : 'text-green-500'}`}>
                                                                    Presupuesto: {budgetPercentage}%
                                                                </span>
                                                            )}
                                                        </div>
                                                    </div>
                                                    <div className="w-full bg-gray-700 rounded-full h-2">
                                                        <div 
                                                            className="bg-red-500 h-2 rounded-full transition-all duration-300"
                                                            style={{ width: `${Math.min(percentage, 100)}%` }}
                                                        ></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Historial de Ingresos */}
                        <div className="mt-6 bg-gray-800 rounded-lg p-6">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-lg font-semibold">Historial de Ingresos</h2>
                                <span className="text-sm text-gray-400">
                                    {filteredIncomes.length} registros
                                </span>
                            </div>
                            {filteredIncomes.length === 0 ? (
                                <div className="text-gray-400 text-center py-4">
                                    <i data-lucide="dollar-sign" className="w-8 h-8 mx-auto mb-2 opacity-50"></i>
                                    <p>No hay ingresos registrados</p>
                                </div>
                            ) : (
                                <div className="space-y-3 max-h-80 overflow-y-auto">
                                    {filteredIncomes.map((income) => (
                                        <TransactionItem 
                                            key={income.id}
                                            transaction={income}
                                            type="income"
                                            onEdit={() => setActiveModal(`edit-income-${income.id}`)}
                                            onDelete={() => setActiveModal(`delete-income-${income.id}`)}
                                            refreshData={refreshData}
                                        />
                                    ))}
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Modales */}
                    {activeModal === 'expense' && (
                        <ExpenseModal 
                            onClose={() => setActiveModal(null)} 
                            refreshData={refreshData}
                            categories={expenseCategories}
                        />
                    )}
                    {activeModal === 'income' && (
                        <IncomeModal 
                            onClose={() => setActiveModal(null)} 
                            refreshData={refreshData}
                            categories={incomeCategories}
                        />
                    )}
                    {activeModal === 'reports' && (
                        <ReportsModal 
                            onClose={() => setActiveModal(null)}
                            expenses={expenses}
                            incomes={incomes}
                            expenseCategories={expenseCategories}
                        />
                    )}
                    {activeModal === 'categories' && (
                        <CategoriesModal 
                            onClose={() => setActiveModal(null)}
                            refreshData={refreshData}
                            expenseCategories={expenseCategories}
                            incomeCategories={incomeCategories}
                        />
                    )}
                    {activeModal === 'budgets' && (
                        <BudgetsModal 
                            onClose={() => setActiveModal(null)}
                            refreshData={refreshData}
                            budgets={budgets}
                            expenseCategories={expenseCategories}
                        />
                    )}
                    
                    {/* Modales de edición/eliminación dinámicos */}
                    {activeModal?.startsWith('edit-expense-') && (
                        <ExpenseModal 
                            onClose={() => setActiveModal(null)} 
                            refreshData={refreshData}
                            categories={expenseCategories}
                            transactionId={activeModal.replace('edit-expense-', '')}
                            expenses={expenses}
                        />
                    )}
                    {activeModal?.startsWith('edit-income-') && (
                        <IncomeModal 
                            onClose={() => setActiveModal(null)} 
                            refreshData={refreshData}
                            categories={incomeCategories}
                            transactionId={activeModal.replace('edit-income-', '')}
                            incomes={incomes}
                        />
                    )}
                    {activeModal?.startsWith('delete-expense-') && (
                        <DeleteModal 
                            onClose={() => setActiveModal(null)} 
                            refreshData={refreshData}
                            transactionId={activeModal.replace('delete-expense-', '')}
                            type="expense"
                        />
                    )}
                    {activeModal?.startsWith('delete-income-') && (
                        <DeleteModal 
                            onClose={() => setActiveModal(null)} 
                            refreshData={refreshData}
                            transactionId={activeModal.replace('delete-income-', '')}
                            type="income"
                        />
                    )}
                </div>
            );
        }

        // =============================================
        // COMPONENTE DE AUTENTICACIÓN
        // =============================================
        function AuthScreen() {
            const [isLogin, setIsLogin] = React.useState(true);
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [fullName, setFullName] = React.useState('');
            const [familyCode, setFamilyCode] = React.useState('');
            const [showPassword, setShowPassword] = React.useState(false);
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');

                try {
                    if (isLogin) {
                        const { error } = await supabase.auth.signInWithPassword({
                            email,
                            password,
                        });
                        if (error) throw error;
                    } else {
                        const { data: authData, error: authError } = await supabase.auth.signUp({
                            email,
                            password,
                        });
                        if (authError) throw authError;

                        if (authData.user) {
                            const finalFamilyCode = familyCode || generateFamilyCode();
                            
                            const { data: profileData, error: profileError } = await supabase
                                .from('profiles')
                                .insert([
                                    {
                                        id: authData.user.id,
                                        email: email,

        // =============================================
        // COMPONENTE MODAL CORREGIDO
        // =============================================
        function Modal({ title, children, onClose, wide = false }) {
            const modalRef = React.useRef(null);

            const handleBackdropClick = (e) => {
                // Cerrar solo si se hace click en el backdrop (fondo oscuro)
                if (e.target === e.currentTarget) {
                    onClose();
                }
            };

            // Cerrar con tecla Escape
            React.useEffect(() => {
                const handleEscape = (e) => {
                    if (e.key === 'Escape') {
                        onClose();
                    }
                };

                document.addEventListener('keydown', handleEscape);
                return () => document.removeEventListener('keydown', handleEscape);
            }, [onClose]);

            return (
                <div 
                    className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50"
                    onClick={handleBackdropClick}
                >
                    <div 
                        ref={modalRef}
                        className={`bg-gray-800 rounded-lg w-full ${wide ? 'max-w-4xl' : 'max-w-md'} max-h-[90vh] overflow-y-auto`}
                        onClick={(e) => e.stopPropagation()} // Prevenir que el click se propague al backdrop
                    >
                        <div className="flex items-center justify-between p-6 border-b border-gray-700">
                            <h3 className="text-lg font-semibold">{title}</h3>
                            <button
                                onClick={onClose}
                                className="text-gray-400 hover:text-white transition-colors p-1 rounded"
                                aria-label="Cerrar modal"
                            >
                                <i data-lucide="x" className="w-6 h-6"></i>
                            </button>
                        </div>
                        <div className="p-6">
                            {children}
                        </div>
                    </div>
                </div>
            );
        }

    const [amount, setAmount] = React.useState('');
    const [description, setDescription] = React.useState('');
    const [category, setCategory] = React.useState('');
    const [date, setDate] = React.useState(new Date().toISOString().split('T')[0]);
    const [loading, setLoading] = React.useState(false);
    const [isEditing, setIsEditing] = React.useState(false);

    // Categorías de respaldo por si las de Supabase están vacías
    const defaultCategories = [
        'Alimentación', 'Transporte', 'Vivienda', 'Entretenimiento', 
        'Salud', 'Educación', 'Ropa', 'Otros'
    ];

    // Usar categorías de Supabase o las de respaldo
    const availableCategories = categories && categories.length > 0 
        ? categories.map(cat => cat.name) 
        : defaultCategories;

    // Cargar datos cuando el componente se monta - SOLO UNA VEZ
React.useEffect(() => {
    console.log('Modal cargado - Transaction ID:', transactionId);
    console.log('Categorías disponibles:', availableCategories);
    
    // Si estamos editando, cargar los datos del gasto
    if (transactionId && expenses && expenses.length > 0) {
        const expense = expenses.find(e => e.id == transactionId);
        if (expense) {
            console.log('Datos del gasto a editar:', expense);
            
            // Convertir el amount a string
            const amountValue = expense.amount.toString();
            setAmount(amountValue);
            
            setDescription(expense.description);
            setCategory(expense.category);
            setDate(expense.date);
            setIsEditing(true);
        }
    } else {
        // Si es nuevo gasto, establecer primera categoría por defecto
        if (availableCategories.length > 0 && !category) {
            setCategory(availableCategories[0]);
        }
    }
}, []); // <-- Array de dependencias VACÍO para que solo se ejecute una vez

    const handleSubmit = async (e) => {
        e.preventDefault();
        
        if (!amount || !description || !category || !date) {
            alert('Por favor completa todos los campos');
            return;
        }

        setLoading(true);

        try {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) throw new Error('No hay usuario autenticado');

            const { data: profile } = await supabase
                .from('profiles')
                .select('family_code')
                .eq('id', user.id)
                .single();

            if (!profile) throw new Error('No se pudo obtener el perfil del usuario');

            if (isEditing) {
                // Editar gasto existente
                const { error } = await supabase
                    .from('expenses')
                    .update({
                        amount: parseFloat(amount),
                        description: description,
                        category: category,
                        date: date,
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', transactionId);

                if (error) throw error;
                showToast('Gasto actualizado exitosamente!', 'success');
            } else {
                // Crear nuevo gasto
                const { error } = await supabase
                    .from('expenses')
                    .insert([
                        {
                            amount: parseFloat(amount),
                            description: description,
                            category: category,
                            date: date,
                            family_code: profile.family_code,
                            created_by: user.id,
                        },
                    ]);

                if (error) throw error;
                showToast('Gasto agregado exitosamente!', 'success');
            }

            onClose();
            refreshData();
            
        } catch (error) {
            console.error('Error saving expense:', error);
            showToast('Error: ' + error.message, 'error');
        } finally {
            setLoading(false);
        }
    };

    return (
        <Modal title={isEditing ? "Editar Gasto" : "Agregar Gasto"} onClose={onClose}>
            <form onSubmit={handleSubmit} className="space-y-4">
                <div>
                    <label className="block text-sm font-medium text-gray-300 mb-2">
                        Cantidad *
                    </label>
                    <input
    type="number"
    step="0.01"
    value={amount}
    onChange={(e) => setAmount(e.target.value)}
    className="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none"
    placeholder="0.00"
    required
/>
                </div>

                    <label className="block text-sm font-medium text-gray-300 mb-2">
                        Descripción *
                    </label>
                    <input
                        type="text"
                        value={description}
                        onChange={(e) => setDescription(e.target.value)}
                        className="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none"
                        placeholder="Ej: Supermercado, Gasolina, etc."
                        required
                    />
                </div>

                <div>
                    <label className="block text-sm font-medium text-gray-300 mb-2">
                        Categoría *
                    </label>
                    <select
                        value={category}
                        onChange={(e) => setCategory(e.target.value)}
                        className="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none"
                        required
                    >
                        <option value="">Seleccionar categoría</option>
                        {availableCategories.map((cat, index) => (
                            <option key={index} value={cat}>{cat}</option>
                        ))}
                    </select>
                    {!categories || categories.length === 0 ? (
                        <p className="text-yellow-400 text-xs mt-1">
                            Usando categorías temporales. Ve a "Categorías" para gestionar las categorías de tu familia.
                        </p>
                    ) : null}
                </div>

                <div>
                    <label className="block text-sm font-medium text-gray-300 mb-2">
                        Fecha *
                    </label>
                    <input
                        type="date"
                        value={date}
                        onChange={(e) => setDate(e.target.value)}
                        className="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none"

                    />

                <div className="flex space-x-3 pt-4">

                        ) : (
